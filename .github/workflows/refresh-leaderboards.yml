name: refresh leaderboards

on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC (off-peak)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install llmbench
        run: pip install -e .

      - name: Fetch leaderboard snapshots
        run: |
          mkdir -p web/data
          llmbench leaderboard --source huggingface --top 200 --json > web/data/huggingface.json
          llmbench leaderboard --source lmarena     --top 500 --json > web/data/lmarena.json
          llmbench leaderboard --source aider       --top 200 --json > web/data/aider.json
          llmbench leaderboard --source bundled     --top 500 --json > web/data/bundled.json

      - name: Merge into all.json
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone

          paths = [
              "web/data/huggingface.json",
              "web/data/lmarena.json",
              "web/data/aider.json",
              "web/data/bundled.json",
          ]
          snapshots = [json.load(open(p)) for p in paths]
          entries = []
          for s in snapshots:
              entries.extend(s.get("entries", []))
          merged = {
              "generated_at": datetime.now(timezone.utc).isoformat(timespec="seconds"),
              "sources": [
                  {
                      "source": s["source"],
                      "source_url": s.get("source_url"),
                      "fetched_at": s.get("fetched_at"),
                      "count": len(s.get("entries", [])),
                  }
                  for s in snapshots
              ],
              "entries": entries,
          }
          with open("web/data/all.json", "w") as f:
              json.dump(merged, f, indent=2)
          print(f"merged {len(entries)} entries")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git commit -m "chore: refresh leaderboard snapshots"
          git push origin HEAD:main
